name: Build MT5 Bridge

on:
  push:
    branches: [master]
    paths:
      - "mt5_bridge/**"
      - ".github/workflows/build-bridge.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies & build
        shell: pwsh
        run: |
          pip install MetaTrader5 flask flask-cors pystray Pillow pyinstaller
          Set-Location mt5_bridge
          pyinstaller `
            --onefile `
            --windowed `
            --name mt5_bridge `
            --hidden-import pystray._win32 `
            mt5_bridge.py

      - name: Publish to GitHub Releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          $notes = @"
          ## MT5 Bridge

          **ดาวน์โหลด mt5_bridge.exe แล้วดับเบิ้ลคลิกรัน** — ไม่ต้องติดตั้ง Python

          Built from commit ``$sha``
          "@

          gh release delete latest --yes --cleanup-tag 2>$null
          gh release create latest mt5_bridge/dist/mt5_bridge.exe `
            --title "MT5 Bridge — Latest" `
            --notes $notes `
            --latest
