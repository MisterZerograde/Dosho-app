name: Build MT5 Sync

on:
  push:
    branches: [master]
    paths:
      - "mt5_bridge/**"
      - ".github/workflows/build-bridge.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies & build
        shell: pwsh
        run: |
          pip install MetaTrader5 customtkinter pyinstaller
          Set-Location mt5_bridge
          pyinstaller `
            --onefile `
            --windowed `
            --name mt5_sync `
            --hidden-import customtkinter `
            --collect-all customtkinter `
            mt5_sync.py

      - name: Publish to GitHub Releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          $notes = @"
          ## MT5 Sync

          **ดาวน์โหลด mt5_sync.exe แล้วดับเบิ้ลคลิกรัน** — ไม่ต้องติดตั้ง Python

          - เลือกช่วงเวลาและตั้ง Auto sync
          - กด **Sync & Copy**
          - ไปกด **Paste MT5** ใน Dosho

          Built from commit ``$sha``
          "@

          gh release delete latest --yes --cleanup-tag 2>$null
          gh release create latest mt5_bridge/dist/mt5_sync.exe `
            --title "MT5 Sync — Latest" `
            --notes $notes `
            --latest
